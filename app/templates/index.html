<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flashdrop</title>
  <link rel="manifest" href="/static/manifest.json">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f3;
      min-height: 100vh;
      padding: 1.5rem;
      color: #1a1a18;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 680px;
      margin: 0 auto 2rem;
    }
    .logo { font-size: 18px; font-weight: 600; letter-spacing: -0.4px; }
    .logout-btn {
      font-size: 13px;
      color: #5f5e5a;
      background: none;
      border: 0.5px solid #d3d1c7;
      border-radius: 6px;
      padding: 5px 12px;
      cursor: pointer;
      transition: background 0.15s;
      text-decoration: none;
    }
    .logout-btn:hover { background: #f1efe8; }
    .wrap { max-width: 680px; margin: 0 auto; }
    .drop-zone {
      border: 1.5px dashed #d3d1c7;
      border-radius: 14px;
      padding: 3rem 2rem;
      text-align: center;
      background: #fff;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 1.5rem;
    }
    .drop-zone.dragover { border-color: #888780; background: #f9f9f7; }
    .drop-icon {
      width: 44px;
      height: 44px;
      background: #f1efe8;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
    }
    .drop-zone h2 { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
    .drop-zone p { font-size: 13px; color: #888780; }
    .drop-zone p span { color: #1a1a18; text-decoration: underline; text-underline-offset: 2px; }
    .progress-bar {
      height: 2px;
      background: #e0dfd8;
      border-radius: 2px;
      margin-top: 1rem;
      overflow: hidden;
      display: none;
    }
    .progress-fill {
      height: 100%;
      background: #1a1a18;
      width: 0%;
      transition: width 0.3s;
    }
    .section-title {
      font-size: 11px;
      font-weight: 500;
      color: #b4b2a9;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }
    .file-list { display: flex; flex-direction: column; gap: 6px; }
    .file-row {
      background: #fff;
      border: 0.5px solid #e0dfd8;
      border-radius: 10px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .file-icon {
      width: 32px;
      height: 32px;
      background: #f1efe8;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .file-name {
      font-size: 14px;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .dl-btn {
      font-size: 12px;
      color: #5f5e5a;
      background: none;
      border: 0.5px solid #d3d1c7;
      border-radius: 6px;
      padding: 4px 10px;
      cursor: pointer;
      white-space: nowrap;
      text-decoration: none;
      transition: background 0.15s;
    }
    .dl-btn:hover { background: #f1efe8; }
    .empty {
      font-size: 13px;
      color: #b4b2a9;
      text-align: center;
      padding: 2rem 0;
    }
    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a18;
      color: #fff;
      font-size: 13px;
      padding: 8px 16px;
      border-radius: 8px;
      opacity: 0;
      transition: opacity 0.25s;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="logo">Flashdrop</div>
    <a href="/logout" class="logout-btn">Sign out</a>
  </div>

  <div class="wrap">
    <div class="drop-zone" id="drop-zone">
      <div class="drop-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#5f5e5a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
      </div>
      <h2>Drop files here</h2>
      <p>or <span id="browse-link">browse from your device</span></p>
      <div class="progress-bar" id="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>

    <input type="file" id="file-input" multiple style="display:none">

    <div class="section-title">Files</div>
    <div class="file-list" id="file-list">
      <div class="empty">No files yet — drop something above</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const fileList = document.getElementById('file-list');
    const progressBar = document.getElementById('progress-bar');
    const progressFill = document.getElementById('progress-fill');
    const toast = document.getElementById('toast');

    function showToast(msg, duration = 3000) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), duration);
    }

    function fileIcon() {
      return `<div class="file-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#5f5e5a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/>
          <polyline points="13 2 13 9 20 9"/>
        </svg>
      </div>`;
    }

    async function loadFiles() {
      const res = await fetch('/files');
      const data = await res.json();
      if (!data.files || data.files.length === 0) {
        fileList.innerHTML = '<div class="empty">No files yet — drop something above</div>';
        return;
      }
      fileList.innerHTML = data.files.map(name => `
        <div class="file-row">
          ${fileIcon()}
          <span class="file-name">${name}</span>
          <a class="dl-btn" href="/download/${encodeURIComponent(name)}">Download</a>
        </div>
      `).join('');
    }

    async function uploadFile(file) {
      const formData = new FormData();
      formData.append('file', file);
      progressBar.style.display = 'block';
      progressFill.style.width = '30%';
      try {
        const res = await fetch('/upload', { method: 'POST', body: formData });
        progressFill.style.width = '100%';
        const data = await res.json();
        setTimeout(() => {
          progressBar.style.display = 'none';
          progressFill.style.width = '0%';
        }, 400);
        if (data.success) {
          showToast(`"${data.filename}" uploaded`);
          loadFiles();
        } else {
          showToast(`Error: ${data.error}`);
        }
      } catch (e) {
        progressBar.style.display = 'none';
        showToast('Upload failed');
      }
    }

    document.getElementById('browse-link').addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('click', (e) => { if (e.target.id !== 'browse-link') fileInput.click(); });

    fileInput.addEventListener('change', () => {
      [...fileInput.files].forEach(uploadFile);
      fileInput.value = '';
    });

    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      [...e.dataTransfer.files].forEach(uploadFile);
    });

    loadFiles();
  </script>
</body>
</html>
