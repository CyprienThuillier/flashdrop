<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flashdrop — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .card {
      background: #fff;
      border: 0.5px solid #e0dfd8;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
    }
    .lock-icon {
      width: 36px;
      height: 36px;
      background: #f1efe8;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.25rem;
    }
    h1 { font-size: 22px; font-weight: 600; color: #1a1a18; letter-spacing: -0.5px; margin-bottom: 0.25rem; }
    .subtitle { font-size: 13px; color: #888780; margin-bottom: 2rem; }
    .error {
      font-size: 12px;
      color: #a32d2d;
      background: #fcebeb;
      border: 0.5px solid #f09595;
      border-radius: 6px;
      padding: 8px 12px;
      margin-bottom: 1rem;
    }
    label { font-size: 13px; color: #5f5e5a; display: block; margin-bottom: 6px; }
    input[type="password"] {
      width: 100%;
      height: 40px;
      border: 0.5px solid #d3d1c7;
      border-radius: 8px;
      padding: 0 12px;
      font-size: 14px;
      outline: none;
      background: #fff;
      color: #1a1a18;
      transition: border-color 0.15s;
    }
    input[type="password"]:focus { border-color: #888780; }
    button[type="submit"] {
      width: 100%;
      height: 40px;
      margin-top: 1.25rem;
      background: #1a1a18;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button[type="submit"]:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="card">
    <div class="lock-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#5f5e5a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <h1>Flashdrop</h1>
    <p class="subtitle">Local file transfer — enter your password</p>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <form action="/login" method="POST">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="••••••••" autofocus required>
      <button type="submit">Sign in</button>
    </form>
  </div>
</body>
</html>
